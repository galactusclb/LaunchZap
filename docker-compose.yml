name: launch-zap
services:
  db:
    image: bitnami/postgresql:latest
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test-db
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
    ports:
      - "5432:5432"
    restart: always
    networks:
      - inner-net
    volumes:
      - db_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-replica:  
    image: bitnami/postgresql:latest
    container_name: db-replica
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
      POSTGRESQL_MASTER_HOST: db
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
    ports:
      - "5433:5432"
    networks:
      - inner-net
    volumes:
      - db_replica_data:/bitnami/postgresql
    depends_on:
      db:
        condition: service_healthy

  redis-client:
    image: redis:7-alpine
    container_name: redis-client
    ports:
      - "6379:6379"
    networks:
      - inner-net
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/test-db
      DATABASE_URL_READ: postgresql://postgres:postgres@db-replica:5432/test-db
      REDIS_CLIENT_URL: redis://redis-client:6379
      ACCESS_SECRET: random3233cscsdc
      GOOGLE_CLIENT_ID: REDACTED_GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET: REDACTED_GOOGLE_CLIENT_SECRET
      GOOGLE_REDIRECT_URI: http://localhost:4000/api/auth/google/callback
      WEB_APP_URL: http://localhost:3000
      LOG_LEVEL: trace
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - inner-net
    depends_on:
      db:
        condition: service_healthy
      redis-client:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    # command: sh -c "npx prisma migrate dev && npm run dev"

  web:
    build: 
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: web
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:4000/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      AWS_REGION: 'us-east-1'
      AWS_SECRET_MANAGER_SECRET_NAME: 'launchzap/app-config/dev'
      AWS_CLOUDFRONT_DOMAIN: 'https://sample.com'
      REDIS_CLIENT_URL: redis://redis-client:6379
    env_file:
      - .env.infra
      - ./apps/web/.env.infra
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
      - ./apps/web/.env.local:/app/.env.local
      - /app/.next
      - /app/node_modules
    networks:
      - inner-net
    depends_on:
      api:
        condition: service_healthy

networks:
  inner-net:

volumes:
  db_data:
  db_replica_data:
  redis_data: