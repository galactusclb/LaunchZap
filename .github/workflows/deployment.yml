name: Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed apps
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - app: api
            context: ./api
          - app: web
            context: ./web

    steps:
      - name: Check if changed
        id: check
        run: |
          if [[ "${{ matrix.app }}" == "api" && "${{ needs.detect-changes.outputs.api }}" == "true" ]] || \
             [[ "${{ matrix.app }}" == "web" && "${{ needs.detect-changes.outputs.web }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in ${{ matrix.app }}, skipping."
          fi

      - name: Log which app will be built
        if: steps.check.outputs.changed == 'true'
        run: echo "Changes detected in ${{ matrix.app }} — will build image from ${{ matrix.context }}"