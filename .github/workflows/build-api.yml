name: Build & Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.tag.outputs.image }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          echo "image=${REGISTRY}/${{ vars.ECR_API_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile.prod
          tags: ${{ steps.tag.outputs.image }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Published
        run: |
          echo "Image pushed successfully:"
          echo "${{ steps.tag.outputs.image }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-api
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_DEPLOYMENT_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \ 
            --task-definition ${{ vars.ECS_API_TASK_DEFINITION_FAMILY_NAME }} \
            --query taskDefinition \
            > task-def.json

      - name: Render new AWS definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with: 
          task-definition: task-def.json
          container-name: ${{ vars.ECS_API_CONTAINER_NAME }}
          image: ${{ needs.build-api.outputs.image }}
      
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_API_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

